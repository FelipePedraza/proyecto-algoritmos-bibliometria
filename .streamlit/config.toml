[server]
port = 8501
address = "0.0.0.0"
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 200

[browser]
gatherUsageStats = false

[theme]
base = "dark"
primaryColor = "#10B981"
backgroundColor = "#1A1A2E"
secondaryBackgroundColor = "#16213E"
textColor = "#E8E8E8"
font = "sans serif"

[logger]
level = "info"
