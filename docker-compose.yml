# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Bibliometría · IA Generativa
# Universidad del Quindío · Análisis de Algoritmos
#
# Uso:
#   docker compose up --build   ← solo la primera vez (o si cambia requirements.txt)
#   docker compose up           ← veces siguientes (segundos)
#   docker compose restart      ← aplicar cambios en .streamlit/config.toml
#   docker compose down         ← detener
# ─────────────────────────────────────────────────────────────────────────────

services:
  bibliometria:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: bibliometria-ia-generativa:latest
    container_name: bibliometria_app

    ports:
      - "8501:8501"

    volumes:
      # Datos persistentes entre sesiones
      - bibliometria_data:/app/data/processed
      - bibliometria_duplicates:/app/data/duplicates
      # Config de Streamlit montada como volumen:
      # cambios en .streamlit/config.toml solo requieren "docker compose restart"
      - ./.streamlit:/app/.streamlit:ro

    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
      - PYTHONUNBUFFERED=1

    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  bibliometria_data:
    driver: local
  bibliometria_duplicates:
    driver: local
